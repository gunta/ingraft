[package]
name = "ingraft-optimized-deps"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ingraft-deps-rust"
path = "src/main.rs"

[dependencies]
ignore = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = 3
panic = "abort"
strip = true
