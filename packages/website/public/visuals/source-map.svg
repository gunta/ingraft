<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="A repository source map showing package locks, upstream git remotes, vendor folders, and ignored tool surfaces.">
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d9d4ca" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#11110f" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#f7f5ef"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity=".62"/>
  <g opacity=".18" stroke="#11110f" stroke-width="2" fill="none">
    <path d="M88 160C210 82 360 84 488 152s238 68 354-4 254-80 374-10 208 64 300-18"/>
    <path d="M38 742c124-86 306-86 476 0s324 80 462-6 292-84 490 8"/>
  </g>
  <g filter="url(#soft)" opacity=".18">
    <rect x="160" y="145" width="360" height="228" rx="22" fill="#11110f"/>
    <text x="194" y="202" fill="#f6f1e8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700">package-lock.json</text>
    <text x="194" y="254" fill="#8bd6b0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">"effect": "3.21.2"</text>
    <text x="194" y="298" fill="#8bd6b0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">"zod": "4.1.12"</text>
    <text x="194" y="342" fill="#f2c76f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">resolved source versions</text>
  </g>
  <g filter="url(#soft)" opacity=".34">
    <rect x="628" y="110" width="344" height="170" rx="22" fill="#ffffff"/>
    <text x="666" y="170" fill="#11110f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="800">upstream git</text>
    <text x="666" y="218" fill="#645f57" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">tag, branch, release</text>
  </g>
  <g filter="url(#soft)">
    <rect x="1066" y="174" width="360" height="244" rx="22" fill="#11110f"/>
    <text x="1102" y="234" fill="#f6f1e8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700">vendor/</text>
    <text x="1102" y="286" fill="#8bd6b0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">subtree</text>
    <text x="1102" y="326" fill="#8bd6b0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">submodule</text>
    <text x="1102" y="366" fill="#8bd6b0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">clone-ignore</text>
  </g>
  <g fill="none" stroke="#d85a3a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M520 256h82"/>
    <path d="M972 202c44 0 56 42 94 42"/>
    <path d="M338 373c0 192 166 270 406 270h120"/>
    <path d="M1248 418c0 160-110 226-286 226"/>
  </g>
  <g filter="url(#soft)" opacity=".36">
    <rect x="700" y="544" width="412" height="212" rx="22" fill="#ffffff"/>
    <text x="738" y="606" fill="#11110f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="800">tool surfaces stay calm</text>
    <text x="738" y="656" fill="#645f57" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">.gitignore  .gitattributes</text>
    <text x="738" y="696" fill="#645f57" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">VS Code  Zed  JetBrains</text>
  </g>
</svg>
